<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style_1.css">
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <h1>
                <img src="logo.png" alt="Profile" class="logo">
            </h1>
            <nav class="nav">
                <a href="#about" class="nav-text1">About</a>
                <a href="#bicycle" class="nav-text2">Bicycle</a>

    <main>

            <img src="mainvisual.png" alt="黒いロードバイクと白い壁の背景" class="main-visual-image">

        <section class="about">
            <div class="about-header">
                <h2 id="about" class="section-title">About</h2>
            </div>

                <img src="about.png" alt="緑のキャップをかぶりスマートフォンを見る男性" class="about-image">
                <p class="about-text">Xxxxx</p>
                <p class="about-subtext">2th Floor xxxxx Building x-x-x Nishiazabu, Minato-ku, Tokyo 106-0031 Japan</p>
            </div>
        </section>
        <section class="bicycle">
            <h2 id="bicycle" class="section-title">Bicycle</h2>
            <div class="bicycle1-wrapper">
                <img src="bicycle1.png" alt="夕暮れの街並みを背景にしたロードバイク" class="bicycle-image">
                <h3 class="bicycle-text">タイトル</h3>
                <p class="bicycle-subtext">テキストテキストテキストテキストテキストテキスト</p>
            </div>
            <div class="bicycle-wrapper">
                <img src="bicycle2.png" alt="レンガ壁に立てかけられたロードバイク" class="bicycle-image">
                <h3 class="bicycle-text">タイトル</h3>
                <p class="bicycle-subtext">テキストテキストテキストテキストテキストテキスト</p>
            </div>
            <div class="bicycle-wrapper">
                <img src="bicycle3.png" alt="白いフレームのロードバイクと観葉植物" class="bicycle-image">
                <h3 class="bicycle-text">タイトル</h3>
                <p class="bicycle-subtext">テキストテキストテキストテキストテキストテキスト</p>
            </div>
        </section>
    </main>
    <footer class="footer">
        <p class="footer-text">©2024 Bullet Group</p>
    </footer>

</body>

</html>
